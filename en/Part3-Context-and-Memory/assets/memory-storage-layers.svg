<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360">
  <defs>
    <style>
      .label    { font: 500 10px 'SF Mono','Menlo','Monaco',monospace; fill:#666; text-anchor:middle; letter-spacing:0.5px; }
      .box-text { font: 600 13px 'SF Mono','Menlo','Monaco',monospace; fill:#1a1a1a; text-anchor:middle; }
      .sub-text { font: 400 10px 'SF Mono','Menlo','Monaco',monospace; fill:#555; text-anchor:start; }
      .badge    { font: 600 10px 'SF Mono','Menlo','Monaco',monospace; fill:#fff; text-anchor:middle; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#666"/>
    </marker>
    <pattern id="dp" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="6" x2="6" y2="0" stroke="#93c5fd" stroke-width="0.5"/>
    </pattern>
    <pattern id="dr" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="6" x2="6" y2="0" stroke="#f9a8d4" stroke-width="0.5"/>
    </pattern>
    <pattern id="dq" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="6" x2="6" y2="0" stroke="#6ee7b7" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="680" height="360" fill="#fff"/>

  <text x="340" y="28" class="label">THREE-TIER MEMORY STORAGE ARCHITECTURE</text>

  <!-- Application layer -->
  <rect x="240" y="42" width="200" height="44" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="340" y="62" class="box-text">Agent Application</text>
  <text x="340" y="78" class="label">APPLICATION LAYER</text>

  <line x1="230" y1="86" x2="182" y2="112" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="86" x2="340" y2="112" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="86" x2="498" y2="112" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PostgreSQL -->
  <rect x="40" y="115" width="240" height="90" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <rect x="40" y="115" width="240" height="90" fill="url(#dp)" rx="2"/>
  <rect x="40" y="115" width="80" height="20" fill="#3b82f6" stroke="none" rx="2"/>
  <text x="80" y="129" class="badge">PostgreSQL</text>
  <text x="160" y="139" class="label">ACID · PERSISTENT</text>
  <text x="55" y="159" class="sub-text">• Execution history / audit logs</text>
  <text x="55" y="175" class="sub-text">• User preferences / config</text>
  <text x="55" y="191" class="sub-text">• Transactional consistency</text>

  <!-- Redis -->
  <rect x="220" y="115" width="240" height="90" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <rect x="220" y="115" width="240" height="90" fill="url(#dr)" rx="2"/>
  <rect x="220" y="115" width="50" height="20" fill="#ec4899" stroke="none" rx="2"/>
  <text x="245" y="129" class="badge">Redis</text>
  <text x="340" y="139" class="label">HOT DATA · MILLISECOND</text>
  <text x="235" y="159" class="sub-text">• Active session cache</text>
  <text x="235" y="175" class="sub-text">• Token budget tracking</text>
  <text x="235" y="191" class="sub-text">• Rate-limit counters</text>

  <!-- Qdrant -->
  <rect x="400" y="115" width="240" height="90" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <rect x="400" y="115" width="240" height="90" fill="url(#dq)" rx="2"/>
  <rect x="400" y="115" width="55" height="20" fill="#10b981" stroke="none" rx="2"/>
  <text x="427" y="129" class="badge">Qdrant</text>
  <text x="520" y="139" class="label">VECTOR SEARCH · SEMANTIC</text>
  <text x="415" y="159" class="sub-text">• Semantic memory retrieval</text>
  <text x="415" y="175" class="sub-text">• Compressed summaries</text>
  <text x="415" y="191" class="sub-text">• RAG knowledge base</text>

  <!-- Latency badges -->
  <rect x="40" y="215" width="240" height="26" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1" rx="2"/>
  <text x="160" y="232" class="label">Latency: 10–50ms · strong consistency</text>
  <rect x="220" y="215" width="240" height="26" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1" rx="2"/>
  <text x="340" y="232" class="label">Latency: 1–5ms · high-frequency access</text>
  <rect x="400" y="215" width="240" height="26" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1" rx="2"/>
  <text x="520" y="232" class="label">Latency: 5–20ms · semantic search</text>

  <!-- Memory type mapping -->
  <text x="340" y="272" class="label">MEMORY TYPE MAPPING</text>
  <rect x="40" y="280" width="600" height="62" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" rx="2"/>

  <rect x="55" y="290" width="120" height="40" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1" rx="2"/>
  <text x="115" y="307" class="sub-text" text-anchor="middle">Working Memory</text>
  <text x="115" y="321" class="label">Context Window</text>

  <rect x="195" y="290" width="120" height="40" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1" rx="2"/>
  <text x="255" y="307" class="sub-text" text-anchor="middle">Session Memory</text>
  <text x="255" y="321" class="label">Redis Cache</text>

  <rect x="335" y="290" width="120" height="40" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1" rx="2"/>
  <text x="395" y="307" class="sub-text" text-anchor="middle">Long-term Memory</text>
  <text x="395" y="321" class="label">PostgreSQL</text>

  <rect x="475" y="290" width="150" height="40" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1" rx="2"/>
  <text x="550" y="307" class="sub-text" text-anchor="middle">Semantic Memory</text>
  <text x="550" y="321" class="label">Qdrant Vector DB</text>
</svg>
