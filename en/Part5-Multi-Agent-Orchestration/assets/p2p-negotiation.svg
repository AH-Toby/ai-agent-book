<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420">
  <defs>
    <style>
      .title { font: 700 16px 'SF Mono', 'PingFang SC', sans-serif; fill: #1a1a1a; text-anchor: middle; }
      .label { font: 500 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #666; text-anchor: middle; letter-spacing: 0.5px; }
      .box-text { font: 600 13px 'SF Mono', 'PingFang SC', monospace; fill: #1a1a1a; text-anchor: middle; }
      .sublabel { font: 500 9px 'SF Mono', 'PingFang SC', monospace; fill: #64748b; text-anchor: middle; }
      .msg-text { font: 500 10px 'SF Mono', 'PingFang SC', monospace; fill: #1a1a1a; text-anchor: middle; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="420" fill="#fff"/>

  <!-- Title -->
  <text x="340" y="30" class="title">P2P Negotiation Protocol</text>
  <text x="340" y="48" class="label">P2P NEGOTIATION PROTOCOL</text>

  <!-- Lead Agent box -->
  <rect x="130" y="72" width="140" height="50" fill="#67e8f9" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <text x="200" y="94" class="box-text">Lead Agent</text>
  <text x="200" y="112" class="sublabel">Coordinator</text>

  <!-- Agent A box -->
  <rect x="410" y="72" width="140" height="50" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <text x="480" y="94" class="box-text">Agent A</text>
  <text x="480" y="112" class="sublabel">Executor</text>

  <!-- Lifelines -->
  <line x1="200" y1="122" x2="200" y2="395" stroke="#ccc" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="480" y1="122" x2="480" y2="395" stroke="#ccc" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Step labels (left side) -->
  <rect x="30" y="152" width="50" height="20" fill="#3b82f6" rx="2"/>
  <text x="55" y="166" style="font: 600 9px 'SF Mono', sans-serif; fill: #fff; text-anchor: middle;">Step 1</text>

  <rect x="30" y="212" width="50" height="20" fill="#3b82f6" rx="2"/>
  <text x="55" y="226" style="font: 600 9px 'SF Mono', sans-serif; fill: #fff; text-anchor: middle;">Step 2</text>

  <rect x="30" y="272" width="50" height="20" fill="#3b82f6" rx="2"/>
  <text x="55" y="286" style="font: 600 9px 'SF Mono', sans-serif; fill: #fff; text-anchor: middle;">Step 3</text>

  <rect x="30" y="362" width="50" height="20" fill="#3b82f6" rx="2"/>
  <text x="55" y="376" style="font: 600 9px 'SF Mono', sans-serif; fill: #fff; text-anchor: middle;">Step 4</text>

  <!-- Message 1: Request -->
  <line x1="200" y1="162" x2="468" y2="162" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="340" y="155" class="msg-text">Request</text>
  <text x="340" y="180" class="sublabel">"Look up Company A's patent data"</text>

  <!-- Message 2: Offer -->
  <line x1="480" y1="222" x2="212" y2="222" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="340" y="215" class="msg-text">Offer (confidence=0.85)</text>
  <text x="340" y="240" class="sublabel">"I have relevant data, can handle it"</text>

  <!-- Message 3: Accept -->
  <line x1="200" y1="282" x2="468" y2="282" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="340" y="275" class="msg-text">Accept</text>
  <text x="340" y="300" class="sublabel">"OK, proceed"</text>

  <!-- Execution box on Agent A lifeline -->
  <rect x="465" y="312" width="30" height="35" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1" rx="2"/>
  <text x="480" y="334" class="sublabel">Execute</text>

  <!-- Message 4: Info result -->
  <line x1="480" y1="372" x2="212" y2="372" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="340" y="365" class="msg-text">Info (result)</text>
  <text x="340" y="390" class="sublabel">Return patent data analysis results</text>
</svg>
