<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320">
  <defs>
    <style>
      .label { font: 500 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #666; text-anchor: middle; letter-spacing: 0.5px; }
      .box-text { font: 600 13px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; text-anchor: middle; }
      .sub-text { font: 400 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #555; text-anchor: middle; }
      .hit-text { font: 600 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #10b981; }
      .miss-text { font: 600 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #ef4444; }
      .annotation { font: 400 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="680" height="320" fill="#fff"/>

  <!-- Title -->
  <text x="340" y="24" class="label">两级缓存架构 / TWO-LEVEL CACHE ARCHITECTURE</text>

  <!-- Request box -->
  <rect x="30" y="100" width="90" height="50" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="75" y="122" class="box-text">请求</text>
  <text x="75" y="140" class="label">REQUEST</text>

  <!-- Arrow request → L1 -->
  <line x1="120" y1="125" x2="158" y2="125" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L1: LRU Memory Cache -->
  <rect x="160" y="80" width="150" height="90" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="235" y="106" class="box-text">L1 内存缓存</text>
  <text x="235" y="122" class="label">LRU MEMORY CACHE</text>
  <rect x="172" y="130" width="126" height="28" fill="#f9a8d4" stroke="none" rx="2"/>
  <text x="235" y="149" class="sub-text">延迟 ≈ 1ms</text>

  <!-- L1 HIT arrow (up, to response) -->
  <line x1="235" y1="80" x2="235" y2="55" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="248" y="72" class="hit-text">HIT → 返回</text>

  <!-- L1 MISS arrow → L2 -->
  <line x1="310" y1="125" x2="358" y2="125" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="334" y="115" class="miss-text">MISS</text>

  <!-- L2: Redis -->
  <rect x="360" y="80" width="150" height="90" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="435" y="106" class="box-text">L2 Redis</text>
  <text x="435" y="122" class="label">DISTRIBUTED CACHE</text>
  <rect x="372" y="130" width="126" height="28" fill="#f9a8d4" stroke="none" rx="2"/>
  <text x="435" y="149" class="sub-text">延迟 ≈ 5ms</text>

  <!-- L2 HIT arrow (up) -->
  <line x1="435" y1="80" x2="435" y2="55" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="448" y="72" class="hit-text">HIT → 返回</text>
  <!-- Backfill L1 -->
  <line x1="435" y1="55" x2="235" y2="55" stroke="#10b981" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="335" y="46" class="label" style="fill:#10b981">回填 L1</text>

  <!-- L2 MISS arrow → PostgreSQL -->
  <line x1="510" y1="125" x2="558" y2="125" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="534" y="115" class="miss-text">MISS</text>

  <!-- PostgreSQL (cold) -->
  <rect x="560" y="80" width="100" height="90" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="610" y="110" class="box-text">PostgreSQL</text>
  <rect x="572" y="130" width="76" height="28" fill="#93c5fd" stroke="none" rx="2"/>
  <text x="610" y="149" class="sub-text">持久化</text>

  <!-- PG → return + backfill L2 + L1 -->
  <line x1="610" y1="80" x2="610" y2="42" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="610" y1="42" x2="436" y2="42" stroke="#10b981" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="524" y="36" class="label" style="fill:#10b981">回填 L2 → L1</text>

  <!-- Response line at top -->
  <line x1="235" y1="42" x2="75" y2="42" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="30" y="33" width="90" height="18" fill="#d1fae5" stroke="#10b981" stroke-width="1" rx="2"/>
  <text x="75" y="46" class="label" style="fill:#10b981">返回响应</text>

  <!-- Notes section -->
  <rect x="30" y="195" width="620" height="105" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" rx="2"/>
  <text x="340" y="213" class="label">设计要点 / DESIGN NOTES</text>

  <line x1="44" y1="224" x2="56" y2="224" stroke="#f9a8d4" stroke-width="3"/>
  <text x="62" y="228" class="annotation">L1 LRU 内存缓存：进程内，最快；容量有限（约 2048 条会话），进程重启丢失</text>

  <line x1="44" y1="244" x2="56" y2="244" stroke="#93c5fd" stroke-width="3"/>
  <text x="62" y="248" class="annotation">L2 Redis 分布式缓存：跨实例共享，TTL 自动过期；多进程/多节点共用同一会话</text>

  <line x1="44" y1="264" x2="56" y2="264" stroke="#6ee7b7" stroke-width="3"/>
  <text x="62" y="268" class="annotation">回填策略：L2 命中后写入 L1；PostgreSQL 命中后同时写入 L2 和 L1</text>

  <line x1="44" y1="284" x2="56" y2="284" stroke="#fde047" stroke-width="3"/>
  <text x="62" y="288" class="annotation">租户隔离：GetSession 检查 TenantID，不匹配返回 ErrSessionNotFound（非 ErrUnauthorized）</text>

</svg>
