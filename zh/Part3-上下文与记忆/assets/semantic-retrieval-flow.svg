<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400">
  <defs>
    <style>
      .label { font: 500 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #666; text-anchor: middle; letter-spacing: 0.5px; }
      .box-text { font: 600 13px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; text-anchor: middle; }
      .sub-text { font: 400 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #666; text-anchor: middle; }
      .annotation { font: 400 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  <rect width="680" height="400" fill="#fff"/>

  <!-- Title -->
  <text x="340" y="30" class="label">语义检索流程 / SEMANTIC RETRIEVAL FLOW</text>

  <!-- Left column: User Query -->
  <rect x="40" y="55" width="150" height="60" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="115" y="82" class="box-text">用户问题</text>
  <text x="115" y="100" class="label">USER QUERY</text>

  <!-- Example query -->
  <rect x="40" y="128" width="150" height="36" fill="#f9f9f9" stroke="#e5e7eb" stroke-width="1" rx="2"/>
  <text x="115" y="145" class="sub-text">"React 组件</text>
  <text x="115" y="158" class="sub-text">怎么优化？"</text>

  <!-- Arrow: Query → Embedding -->
  <line x1="190" y1="85" x2="248" y2="85" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Center: Embedding Model -->
  <rect x="250" y="55" width="160" height="60" fill="#a5f3fc" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="330" y="80" class="box-text">Embedding</text>
  <text x="330" y="97" class="box-text">模型</text>

  <!-- Arrow: Embedding → Vector -->
  <line x1="410" y1="85" x2="468" y2="85" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Label above arrow -->
  <text x="439" y="76" class="label">向量化</text>

  <!-- Right: Query Vector -->
  <rect x="470" y="55" width="170" height="60" fill="#fde047" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="555" y="80" class="box-text">查询向量</text>
  <text x="555" y="97" class="label">QUERY VECTOR [0.12, 0.45...]</text>

  <!-- Separator line -->
  <line x1="40" y1="210" x2="640" y2="210" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="340" y="225" class="label">——— 向量数据库 / VECTOR DATABASE ———</text>

  <!-- Arrow down from query vector to Qdrant -->
  <line x1="555" y1="115" x2="555" y2="243" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="575" y="183" class="annotation">搜索</text>

  <!-- Qdrant box -->
  <rect x="390" y="245" width="330" height="80" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="555" y="276" class="box-text">Qdrant 向量数据库</text>
  <text x="555" y="295" class="label">VECTOR DB</text>
  <text x="555" y="314" class="sub-text">余弦相似度 → Top-K 结果</text>

  <!-- Stored vectors feeding into Qdrant -->
  <rect x="40" y="245" width="150" height="60" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="115" y="272" class="box-text">历史记忆</text>
  <text x="115" y="290" class="label">STORED KNOWLEDGE</text>

  <!-- Arrow: Stored → Embedding -->
  <line x1="190" y1="275" x2="248" y2="275" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Embedding model (second instance, same color) -->
  <rect x="250" y="245" width="130" height="60" fill="#a5f3fc" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="315" y="272" class="box-text">Embedding</text>
  <text x="315" y="289" class="box-text">模型</text>

  <!-- Arrow: Embedding → Qdrant -->
  <line x1="380" y1="275" x2="388" y2="275" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: Qdrant → Result -->
  <line x1="555" y1="325" x2="555" y2="353" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Result box -->
  <rect x="390" y="355" width="330" height="35" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="555" y="377" class="sub-text">返回："之前讨论过的前端性能优化方案..."</text>

  <!-- Threshold annotation -->
  <rect x="40" y="330" width="330" height="55" fill="#f9f9f9" stroke="#e5e7eb" stroke-width="1" rx="2"/>
  <text x="55" y="350" class="annotation">相似度阈值：</text>
  <text x="55" y="367" class="annotation">精确场景（代码）→ 0.8+</text>
  <text x="55" y="380" class="annotation">宽泛场景（创意）→ 0.6+</text>

</svg>
