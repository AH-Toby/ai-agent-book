<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360">
  <defs>
    <style>
      .label { font: 500 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #666; text-anchor: middle; letter-spacing: 0.5px; }
      .box-text { font: 600 13px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #1a1a1a; text-anchor: middle; }
      .sub-text { font: 400 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #555; text-anchor: start; }
      .badge-text { font: 600 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #fff; text-anchor: middle; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <pattern id="diagonal-pg" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="6" x2="6" y2="0" stroke="#93c5fd" stroke-width="0.5"/>
    </pattern>
    <pattern id="diagonal-rd" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="6" x2="6" y2="0" stroke="#f9a8d4" stroke-width="0.5"/>
    </pattern>
    <pattern id="diagonal-qd" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="6" x2="6" y2="0" stroke="#6ee7b7" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="680" height="360" fill="#fff"/>

  <!-- Title -->
  <text x="340" y="28" class="label">记忆存储三层架构 / THREE-TIER MEMORY STORAGE</text>

  <!-- Agent / Application layer -->
  <rect x="240" y="45" width="200" height="44" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="340" y="66" class="box-text">Agent 应用层</text>
  <text x="340" y="82" class="label">APPLICATION LAYER</text>

  <!-- Arrows down -->
  <line x1="230" y1="89" x2="182" y2="115" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="89" x2="340" y2="115" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="89" x2="498" y2="115" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PostgreSQL -->
  <rect x="40" y="118" width="240" height="90" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <rect x="40" y="118" width="240" height="90" fill="url(#diagonal-pg)" rx="2"/>
  <!-- Badge -->
  <rect x="40" y="118" width="80" height="20" fill="#3b82f6" stroke="none" rx="2"/>
  <text x="80" y="132" class="badge-text">PostgreSQL</text>
  <text x="160" y="142" class="label">ACID · 持久化</text>
  <text x="55" y="162" class="sub-text">• 执行历史 / 审计日志</text>
  <text x="55" y="178" class="sub-text">• 用户偏好 / 系统配置</text>
  <text x="55" y="195" class="sub-text">• 事务一致性</text>

  <!-- Redis -->
  <rect x="220" y="118" width="240" height="90" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <rect x="220" y="118" width="240" height="90" fill="url(#diagonal-rd)" rx="2"/>
  <!-- Badge -->
  <rect x="220" y="118" width="50" height="20" fill="#ec4899" stroke="none" rx="2"/>
  <text x="245" y="132" class="badge-text">Redis</text>
  <text x="340" y="142" class="label">热数据 · 毫秒级</text>
  <text x="235" y="162" class="sub-text">• 活跃会话缓存</text>
  <text x="235" y="178" class="sub-text">• Token 预算追踪</text>
  <text x="235" y="195" class="sub-text">• 速率限制计数器</text>

  <!-- Qdrant -->
  <rect x="400" y="118" width="240" height="90" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <rect x="400" y="118" width="240" height="90" fill="url(#diagonal-qd)" rx="2"/>
  <!-- Badge -->
  <rect x="400" y="118" width="55" height="20" fill="#10b981" stroke="none" rx="2"/>
  <text x="427" y="132" class="badge-text">Qdrant</text>
  <text x="520" y="142" class="label">向量检索 · 语义</text>
  <text x="415" y="162" class="sub-text">• 语义记忆检索</text>
  <text x="415" y="178" class="sub-text">• 压缩摘要存储</text>
  <text x="415" y="195" class="sub-text">• RAG 知识库</text>

  <!-- Access time badges -->
  <rect x="40" y="218" width="240" height="26" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1" rx="2"/>
  <text x="160" y="235" class="label">查询延迟：10-50ms · 适合一致性要求</text>

  <rect x="220" y="218" width="240" height="26" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1" rx="2"/>
  <text x="340" y="235" class="label">查询延迟：1-5ms · 适合高频访问</text>

  <rect x="400" y="218" width="240" height="26" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1" rx="2"/>
  <text x="520" y="235" class="label">查询延迟：5-20ms · 适合语义搜索</text>

  <!-- Memory type mapping -->
  <text x="340" y="275" class="label">记忆类型映射 / MEMORY TYPE MAPPING</text>

  <rect x="40" y="283" width="600" height="62" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" rx="2"/>

  <!-- Type boxes inside -->
  <rect x="55" y="293" width="120" height="40" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1" rx="2"/>
  <text x="115" y="310" class="sub-text" text-anchor="middle">工作记忆</text>
  <text x="115" y="324" class="label">上下文窗口</text>

  <rect x="195" y="293" width="120" height="40" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1" rx="2"/>
  <text x="255" y="310" class="sub-text" text-anchor="middle">会话记忆</text>
  <text x="255" y="324" class="label">Redis 缓存</text>

  <rect x="335" y="293" width="120" height="40" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1" rx="2"/>
  <text x="395" y="310" class="sub-text" text-anchor="middle">长期记忆</text>
  <text x="395" y="324" class="label">PostgreSQL</text>

  <rect x="475" y="293" width="150" height="40" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1" rx="2"/>
  <text x="550" y="310" class="sub-text" text-anchor="middle">语义记忆</text>
  <text x="550" y="324" class="label">Qdrant 向量库</text>

</svg>
