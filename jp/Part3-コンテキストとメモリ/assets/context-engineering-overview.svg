<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420">
  <defs>
    <style>
      .title { font: 700 16px 'SF Mono', 'PingFang SC', sans-serif; fill: #1a1a1a; text-anchor: middle; }
      .label { font: 500 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #666; text-anchor: middle; letter-spacing: 0.5px; }
      .box-text { font: 600 11px 'SF Mono', 'PingFang SC', sans-serif; fill: #1a1a1a; text-anchor: start; }
      .box-sub { font: 500 9px 'SF Mono', 'PingFang SC', sans-serif; fill: #64748b; text-anchor: start; }
      .num { font: 700 9px 'SF Mono', sans-serif; fill: #fff; text-anchor: middle; }
      .capacity { font: 600 10px 'SF Mono', 'PingFang SC', sans-serif; fill: #ef4444; text-anchor: middle; }
      .note { font: 500 9px 'SF Mono', 'PingFang SC', sans-serif; fill: #64748b; text-anchor: middle; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="420" fill="#fff"/>

  <!-- Title -->
  <text x="310" y="28" class="title">コンテキストウィンドウの7大構成要素</text>
  <text x="310" y="45" class="label">CONTEXT WINDOW COMPONENTS</text>

  <!-- Main container -->
  <rect x="70" y="56" width="420" height="340" fill="#fafafa" stroke="#1a1a1a" stroke-width="2" rx="4"/>

  <!-- Component 1: System Instructions -->
  <rect x="90" y="72" width="380" height="35" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <circle cx="108" cy="89" r="9" fill="#3b82f6"/>
  <text x="108" y="93" class="num">1</text>
  <text x="126" y="86" class="box-text">System Instructions</text>
  <text x="126" y="99" class="box-sub">システム指示</text>

  <!-- Component 2: User Prompt -->
  <rect x="90" y="117" width="380" height="35" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <circle cx="108" cy="134" r="9" fill="#ec4899"/>
  <text x="108" y="138" class="num">2</text>
  <text x="126" y="131" class="box-text">User Prompt</text>
  <text x="126" y="144" class="box-sub">ユーザーの現在のリクエスト</text>

  <!-- Component 3: Conversation History -->
  <rect x="90" y="162" width="380" height="35" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <circle cx="108" cy="179" r="9" fill="#f59e0b"/>
  <text x="108" y="183" class="num">3</text>
  <text x="126" y="176" class="box-text">Conversation History</text>
  <text x="126" y="189" class="box-sub">会話履歴</text>

  <!-- Component 4: Long-Term Memory -->
  <rect x="90" y="207" width="380" height="35" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <circle cx="108" cy="224" r="9" fill="#22c55e"/>
  <text x="108" y="228" class="num">4</text>
  <text x="126" y="221" class="box-text">Long-Term Memory</text>
  <text x="126" y="234" class="box-sub">セッション間の永続メモリ</text>

  <!-- Component 5: Retrieved Info (RAG) -->
  <rect x="90" y="252" width="380" height="35" fill="#cffafe" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <circle cx="108" cy="269" r="9" fill="#06b6d4"/>
  <text x="108" y="273" class="num">5</text>
  <text x="126" y="266" class="box-text">Retrieved Info (RAG)</text>
  <text x="126" y="279" class="box-sub">リアルタイム検索による外部知識</text>

  <!-- Component 6: Available Tools -->
  <rect x="90" y="297" width="380" height="35" fill="#ede9fe" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <circle cx="108" cy="314" r="9" fill="#8b5cf6"/>
  <text x="108" y="318" class="num">6</text>
  <text x="126" y="311" class="box-text">Available Tools</text>
  <text x="126" y="324" class="box-sub">利用可能なツール定義と Schema</text>

  <!-- Component 7: Output Format -->
  <rect x="90" y="342" width="380" height="35" fill="#f1f5f9" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <circle cx="108" cy="359" r="9" fill="#64748b"/>
  <text x="108" y="363" class="num">7</text>
  <text x="126" y="356" class="box-text">Output Format</text>
  <text x="126" y="369" class="box-sub">出力フォーマット要件</text>

  <!-- Right side: Capacity bracket -->
  <line x1="510" y1="72" x2="522" y2="72" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="522" y1="72" x2="522" y2="377" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="510" y1="377" x2="522" y2="377" stroke="#ef4444" stroke-width="1.5"/>

  <!-- Capacity label (rotated) -->
  <g transform="translate(545, 224) rotate(-90)">
    <text x="0" y="0" class="capacity">容量制限 LIMITED CAPACITY</text>
  </g>

  <!-- Right side explanation -->
  <text x="600" y="190" class="box-sub" style="text-anchor:middle; fill:#ef4444;">各コンポーネントが</text>
  <text x="600" y="204" class="box-sub" style="text-anchor:middle; fill:#ef4444;">Token 予算を</text>
  <text x="600" y="218" class="box-sub" style="text-anchor:middle; fill:#ef4444;">奪い合う</text>

  <!-- Bottom note -->
  <text x="310" y="410" class="note">これが Context Engineering の核心課題 — 7つの次元で最適配分を行う</text>
</svg>
