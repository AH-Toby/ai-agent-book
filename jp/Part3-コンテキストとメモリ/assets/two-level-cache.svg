<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320">
  <defs>
    <style>
      .label    { font: 500 10px 'SF Mono','Menlo','Monaco',monospace; fill:#666; text-anchor:middle; letter-spacing:0.5px; }
      .box-text { font: 600 13px 'Hiragino Sans','Yu Gothic','SF Mono',monospace; fill:#1a1a1a; text-anchor:middle; }
      .sub-text { font: 400 10px 'Hiragino Sans','Yu Gothic','SF Mono',monospace; fill:#555; text-anchor:middle; }
      .hit      { font: 600 10px 'Hiragino Sans','Yu Gothic',monospace; fill:#10b981; }
      .miss     { font: 600 10px 'SF Mono',monospace; fill:#ef4444; }
      .annot    { font: 400 10px 'Hiragino Sans','Yu Gothic','SF Mono',monospace; fill:#1a1a1a; }
    </style>
    <marker id="arr"   markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#666"/></marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#10b981"/></marker>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ef4444"/></marker>
  </defs>
  <rect width="680" height="320" fill="#fff"/>

  <text x="340" y="24" class="label">二層キャッシュアーキテクチャ / TWO-LEVEL CACHE ARCHITECTURE</text>

  <rect x="30" y="100" width="90" height="50" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="75" y="122" class="box-text">リクエスト</text>
  <text x="75" y="140" class="label">REQUEST</text>

  <line x1="120" y1="125" x2="158" y2="125" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="160" y="80" width="150" height="90" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="235" y="104" class="box-text">L1 メモリキャッシュ</text>
  <text x="235" y="120" class="label">LRU IN-PROCESS</text>
  <rect x="172" y="130" width="126" height="28" fill="#f9a8d4" stroke="none" rx="2"/>
  <text x="235" y="149" class="sub-text">レイテンシ ≈ 1ms</text>

  <line x1="235" y1="80" x2="235" y2="55" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="278" y="72" class="hit">HIT → 返却</text>

  <line x1="310" y1="125" x2="358" y2="125" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="334" y="115" class="miss">MISS</text>

  <rect x="360" y="80" width="150" height="90" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="435" y="104" class="box-text">L2 Redis</text>
  <text x="435" y="120" class="label">DISTRIBUTED CACHE</text>
  <rect x="372" y="130" width="126" height="28" fill="#f9a8d4" stroke="none" rx="2"/>
  <text x="435" y="149" class="sub-text">レイテンシ ≈ 5ms</text>

  <line x1="435" y1="80" x2="435" y2="55" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="448" y="72" class="hit">HIT → 返却</text>
  <line x1="435" y1="55" x2="235" y2="55" stroke="#10b981" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="335" y="46" class="label" style="fill:#10b981">L1にバックフィル</text>

  <line x1="510" y1="125" x2="558" y2="125" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="534" y="115" class="miss">MISS</text>

  <rect x="560" y="80" width="100" height="90" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5" rx="2"/>
  <text x="610" y="108" class="box-text">PostgreSQL</text>
  <rect x="572" y="130" width="76" height="28" fill="#93c5fd" stroke="none" rx="2"/>
  <text x="610" y="149" class="sub-text">永続化</text>

  <line x1="610" y1="80" x2="610" y2="42" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="610" y1="42" x2="436" y2="42" stroke="#10b981" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="524" y="36" class="label" style="fill:#10b981">L2→L1にバックフィル</text>

  <line x1="235" y1="42" x2="75" y2="42" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <rect x="30" y="33" width="90" height="18" fill="#d1fae5" stroke="#10b981" stroke-width="1" rx="2"/>
  <text x="75" y="46" class="label" style="fill:#10b981">レスポンス</text>

  <rect x="30" y="195" width="620" height="108" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" rx="2"/>
  <text x="340" y="213" class="label">設計ノート / DESIGN NOTES</text>
  <line x1="44" y1="224" x2="56" y2="224" stroke="#f9a8d4" stroke-width="3"/>
  <text x="62" y="228" class="annot">L1 LRU：プロセス内最速（最大2048セッション）；プロセス再起動で消失</text>
  <line x1="44" y1="244" x2="56" y2="244" stroke="#93c5fd" stroke-width="3"/>
  <text x="62" y="248" class="annot">L2 Redis：分散共有；TTL自動期限切れ；マルチインスタンス対応</text>
  <line x1="44" y1="264" x2="56" y2="264" stroke="#6ee7b7" stroke-width="3"/>
  <text x="62" y="268" class="annot">バックフィル戦略：L2ヒット→L1に書き戻し；DBヒット→L2→L1に書き戻し</text>
  <line x1="44" y1="284" x2="56" y2="284" stroke="#fde047" stroke-width="3"/>
  <text x="62" y="288" class="annot">テナント分離：TenantID不一致時はErrSessionNotFoundを返す（ErrUnauthorizedではない）</text>
</svg>
